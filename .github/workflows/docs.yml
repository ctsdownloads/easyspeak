name: Docs

on:
  push:
    branches:
    - main
    tags:
    - '*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: false

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        task:
        - check-links
        - lint-docstrings
        - lint-md
      fail-fast: false
    steps:
    - uses: actions/checkout@v6
    - uses: astral-sh/setup-uv@v7
      with:
        python-version: '3.14'
        ignore-nothing-to-cache: true
    - uses: taiki-e/install-action@just
    - name: Install PortAudio headers
      run: |
        sudo apt update
        sudo apt install -y portaudio19-dev
    - run: just ${{ matrix.task }}

  deploy:
    runs-on: ubuntu-latest
    needs: lint
    steps:
    - name: Check out full history for mike
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Fetch LFS assets except the large demo video
      run: git lfs pull --exclude="docs/media/demo.mp4"
    - uses: astral-sh/setup-uv@v7
      with:
        python-version: '3.14'
    - uses: taiki-e/install-action@just
    - name: Install PortAudio headers
      run: |
        sudo apt update
        sudo apt install -y portaudio19-dev
    - name: Build docs site
      run: just docs
    - name: Configure git identity for mike
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
    - name: Archive tagged release snapshot
      if: startsWith(github.ref, 'refs/tags/')
      run: just docs-mike deploy --push "${GITHUB_REF_NAME}"
    - name: Publish "latest" docs from main
      if: github.ref == 'refs/heads/main'
      run: just docs-mike deploy --push latest
    - name: Mirror main to the root and redirect /latest to it
      if: github.ref == 'refs/heads/main'
      run: bash packaging/docs-mirror-root.sh
