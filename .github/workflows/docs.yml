name: Docs

on:
  push:
    branches:
    - main
    tags:
    - '*'
  pull_request:
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        task:
        - check-links
        - lint-docstrings
        - lint-md
      fail-fast: false
    steps:
    - uses: actions/checkout@v6
    - uses: astral-sh/setup-uv@v7
      with:
        python-version: '3.14'
        enable-cache: false
    - uses: taiki-e/install-action@just
    - name: Install PortAudio headers
      run: |
        sudo apt update
        sudo apt install -y portaudio19-dev
    - run: just ${{ matrix.task }}

  deploy:
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy-pages.outputs.page_url }}
    steps:
    - name: Check out full history for mike
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Fetch LFS assets except the large demo video
      run: git lfs pull --exclude="docs/media/demo.mp4"
    - uses: astral-sh/setup-uv@v7
      with:
        python-version: '3.14'
        enable-cache: false
    - uses: taiki-e/install-action@just
    - name: Install PortAudio headers
      run: |
        sudo apt update
        sudo apt install -y portaudio19-dev
    - name: Configure git identity for mike
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
    - name: Publish "latest" docs from main
      if: github.ref == 'refs/heads/main'
      run: |
        just docs-mike deploy --push latest
        just docs-mike set-default --push latest
    - name: Archive a release and move the "stable" alias
      if: startsWith(github.ref, 'refs/tags/')
      run: just docs-mike deploy --push --update-aliases --alias-type=copy "${GITHUB_REF_NAME}" stable
    - name: Fetch updated gh-pages branch
      run: |
        git fetch origin gh-pages
        git worktree add /tmp/gh-pages origin/gh-pages
    - name: Upload Pages artifact from gh-pages branch
      uses: actions/upload-pages-artifact@v3
      with:
        path: /tmp/gh-pages
    - name: Deploy to GitHub Pages
      id: deploy-pages
      uses: actions/deploy-pages@v5
