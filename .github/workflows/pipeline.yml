name: Pipeline

on:
  pull_request:
    branches:
    - main
  push:
    branches:
    - main

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        task:
        - format --diff
        - lint --diff
        - lint-yaml
        - types
        - package
        - check-desktop-integration
      fail-fast: false
    steps:
    - uses: actions/checkout@v6
    - uses: astral-sh/setup-uv@v7
      with:
        python-version: '3.12'
        ignore-nothing-to-cache: true
    - uses: taiki-e/install-action@just
    - run: |
        sudo apt update
        sudo apt install -y portaudio19-dev desktop-file-utils
    - run: just ${{ matrix.task }}

  js:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        task:
        - lint-js
        - test-js
      fail-fast: false
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v5
      with:
        node-version: '22'
    - uses: taiki-e/install-action@just
    - run: npm install --global eslint@10
    - run: just ${{ matrix.task }}

  unit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version:
        - '3.10'
        - '3.11'
        - '3.12'
        - '3.13'
        - '3.14'
      fail-fast: false
    steps:
    - uses: actions/checkout@v6
    - uses: astral-sh/setup-uv@v7
      with:
        python-version: ${{ matrix.python-version }}
        ignore-nothing-to-cache: true
    - uses: taiki-e/install-action@just
    - run: |
        sudo apt update
        sudo apt install -y portaudio19-dev
    - run: just pytest
    - run: just coverage

  acceptance:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: astral-sh/setup-uv@v7
      with:
        python-version: '3.12'
        ignore-nothing-to-cache: true
    - uses: taiki-e/install-action@just
    - run: |
        sudo apt update
        sudo apt install -y portaudio19-dev
    - run: just acceptance

  packaging:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: astral-sh/setup-uv@v7
      with:
        python-version: '3.12'
        ignore-nothing-to-cache: true
    - uses: taiki-e/install-action@just
    - run: just check-python-packages
