# Pinned versions of everything the packaging scripts and the Nix flake
# download. Bump versions here; the consumers stay untouched:
#
#   flake.nix                     Piper voice for `nix run` / dev shell
#   packaging/stage-lang.sh       speech models per language pack
#   packaging/stage-bundle.sh     bundled CPython for the .deb/.rpm
#   packaging/build-in-docker.sh  build container image and nfpm

[python]
bundle = "3.14"

[toolchain]
ubuntu_image = "ubuntu:24.04"
nfpm = "2.47.0"

# Speech models, one table group per language pack (easyspeak-lang-<code>).
# `revision` pins an immutable Hugging Face commit (Whisper) or tag (Piper).
# The [lang.*.*.files] tables are generated by update_pins.py — hex sha256 keyed
# by filename — so each file can be checksum-verified individually. Don't
# hand-edit them; `just update-pins` regenerates them. See DEPENDENCIES.md.

[lang.en.whisper]
model = "base.en"
repo = "Systran/faster-whisper-base.en"
revision = "3d3d5dee26484f91867d81cb899cfcf72b96be6c"

[lang.en.whisper.files]
"config.json" = "f3bc3821e9fc76a27bae538e11ae5b677dcdd352b4600429ce7951d398569aeb"
"model.bin" = "2a166925539a16005f14ff328359f9b9adb9dc4fb631bb3b227526862e93e2ef"
"tokenizer.json" = "929c5252409436dce1b38a75d1abbcb5e132d170d8e324e4e04ed915fa2d22df"
"vocabulary.txt" = "ff77588746d3a2595d32ab5b69ffd7b95ce2441ac57533cb66fc3eb575a115cf"

[lang.en.piper]
voice = "en_US-amy-medium"
repo = "rhasspy/piper-voices"
revision = "v1.0.0"
path = "en/en_US/amy/medium"

[lang.en.piper.files]
"en_US-amy-medium.onnx" = "b3a6e47b57b8c7fbe6a0ce2518161a50f59a9cdd8a50835c02cb02bdd6206c18"
"en_US-amy-medium.onnx.json" = "95a23eb4d42909d38df73bb9ac7f45f597dbfcde2d1bf9526fdeaf5466977d77"
