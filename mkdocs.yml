site_name: EasySpeak
site_description: Voice control for Linux desktops. Fully local, no cloud, Wayland-native.
# Docs are versioned with mike (see the `extra.version` block and the Docs
# workflow): each release/dev build is archived under its own `/<version>/`
# path, while the latest docs are published to the site root for clean,
# version-less URLs. Point site_url (canonical links, sitemap) at that root, so
# the archived snapshots' canonical URLs reference the latest version.
site_url: https://easyspeak.dev/
repo_url: https://github.com/ctsdownloads/easyspeak
repo_name: ctsdownloads/easyspeak
copyright: Copyright &copy; EasySpeak contributors — GPL-3.0

theme:
  name: material
  icon:
    repo: fontawesome/brands/github
  palette:
  - media: "(prefers-color-scheme: light)"
    scheme: default
    primary: black
    accent: indigo
    toggle:
      icon: material/weather-night
      name: Switch to dark mode
  - media: "(prefers-color-scheme: dark)"
    scheme: slate
    primary: black
    accent: indigo
    toggle:
      icon: material/weather-sunny
      name: Switch to light mode
  features:
  - navigation.sections
  - navigation.top
  - navigation.tracking
  - content.code.copy
  - toc.follow
  - search.suggest

# CHANGELOG.md and LICENSE stay authoritative at the repo root; the docs pages
# pull them in via pymdownx.snippets (the --8<-- directive), so they are never
# duplicated. snippets' base_path lets those root files resolve. The contributing
# guide is authored natively in docs/contributing.md (so its cross-links validate);
# the root CONTRIBUTING.md is a short stub pointing here for GitHub.
docs_dir: docs

# These assets live under docs/media/ but are not referenced by any page, so
# keep them out of the built site (the demo video is a 23 MB LFS object).
exclude_docs: |
  media/demo.mp4
  media/log.txt

nav:
- Home: index.md
- Installation: installation.md
- Packaging: packaging.md
- Usage: usage.md
- Screenshots: screenshots.md
- Commands: commands.md
- Writing Plugins: plugins.md
- Troubleshooting: troubleshooting.md
- How It Works: how-it-works.md
- API Reference:
  - Core: reference/core.md
  - Plugins: reference/plugins.md
- Contributing: contributing.md
- Changelog: changelog.md
- License: license.md

plugins:
- search
- mkdocstrings:
    handlers:
      python:
        # The package dir is `easyspeak = "src"` (see pyproject.toml), so the
        # source lives under src/ and griffe analyses it statically from
        # there: modules resolve as `core.*` / `plugins.*`.
        paths: [src]
        options:
          docstring_style: google
          show_source: true
          show_root_heading: true
          show_symbol_type_heading: true
          show_symbol_type_toc: true
          members_order: source
          merge_init_into_class: true
          separate_signature: true
          # Render Mermaid class/inheritance diagrams from the type hierarchy.
          show_inheritance_diagram: true

markdown_extensions:
- admonition
- attr_list
- footnotes
- md_in_html
- tables
- toc:
    permalink: true
- pymdownx.highlight:
    anchor_linenums: true
- pymdownx.inlinehilite
- pymdownx.snippets:
    base_path: [.]
    check_paths: true
- pymdownx.superfences:
    custom_fences:
    - name: mermaid
      class: mermaid
      format: !!python/name:pymdownx.superfences.fence_code_format
- pymdownx.tabbed:
    alternate_style: true

extra:
  version:
    provider: mike
